# SECURITY WARNING — read before modifying volumes:
#
#   The workspace mount gives the container (and Claude) full read/write access
#   to whatever directory you bind. Never mount sensitive paths like $HOME, /,
#   /etc, or directories containing secrets/credentials.
#
#   CHROXY_NO_AUTH=true disables the API token check. Do NOT combine this with
#   an active tunnel (CHROXY_TUNNEL != none) — the entrypoint blocks this and
#   will refuse to start as an unsafe configuration.
#
#   permissionMode: auto in the container means Claude can read/write/execute
#   anything inside the mounted workspace without prompting.

services:
  chroxy:
    build: .
    restart: unless-stopped
    init: true                    # reap zombie processes (PID 1 signal forwarding)
    mem_limit: 4g
    memswap_limit: 4g
    cpus: "2.0"
    pids_limit: 512
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "${PORT:-8765}:${PORT:-8765}"
    environment:
      - ANTHROPIC_API_KEY          # REQUIRED — set in .env or shell
      - PORT=${PORT:-8765}
      - API_TOKEN                  # optional, auto-generated if missing
      - CHROXY_CWD=/workspace
      - CHROXY_MODEL               # optional, e.g. claude-sonnet-4-5-20250929
      - CHROXY_TUNNEL=${CHROXY_TUNNEL:-quick}
      - CHROXY_TUNNEL_NAME         # for named tunnel
      - CHROXY_TUNNEL_HOSTNAME     # for named tunnel
    volumes:
      - chroxy-data:/home/chroxy/.chroxy      # config + session state
      - chroxy-claude:/home/chroxy/.claude     # Claude settings
      - ${WORKSPACE_PATH:-.}:/workspace       # project files to work on
      # Named tunnel credentials (uncomment if using named tunnel):
      # - ${HOME}/.cloudflared:/home/chroxy/.cloudflared:ro

volumes:
  chroxy-data:
  chroxy-claude:
