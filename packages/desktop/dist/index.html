<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chroxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #fff;
    }
    p {
      font-size: 0.95rem;
      color: #999;
      line-height: 1.6;
    }
    .status {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
      margin-right: 8px;
      vertical-align: middle;
    }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #666;
    }
    code {
      background: #2a2a3e;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="status"></span>Server Not Running</h1>
    <p>The Chroxy server is not currently running.</p>
    <p>Use the tray menu to start the server, or run:</p>
    <p class="hint"><code>npx chroxy start</code></p>
  </div>
</body>
</html>
