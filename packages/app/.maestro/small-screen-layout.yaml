appId: com.blamechris.chroxy
name: Small screen layout (iPhone SE)
---

# Verify ConnectScreen renders correctly on a small 375pt viewport (iPhone SE).
# This flow should be run on an iPhone SE simulator.

# Navigate to ConnectScreen from any state
- runFlow: setup/ensure-connect-screen.yaml

# Verify all key elements are visible (not clipped or overlapping)
- assertVisible: "Connect to Chroxy"

- assertVisible:
    text: ".*Scan QR Code.*"

- assertVisible:
    text: ".*Scan Local Network.*"

# Match by testID, not text — the toggle's accessibilityLabel is "Enter server
# address manually" and its visible text is icon-prefixed, so a
# ".*Enter manually.*" text match misses it (same as connect-screen.yaml).
- assertVisible:
    id: "connect-manual-toggle"

# Port input should show default port
- assertVisible: "8765"

# Take screenshot for visual verification of small-screen layout
- takeScreenshot: small-screen-layout
