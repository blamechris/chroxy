appId: com.blamechris.chroxy
name: Reconnect after tunnel drop (#4701)
---

# #4701 / #5468 — End-to-end coverage for the ConnectionPhase
# `connected → reconnecting → connected` transition after the WebSocket
# drops. Unit tests in `__tests__/store/connection.*.test.ts` pin the
# state-machine transitions, but no E2E ever exercised the visual
# reconnect banner / spinner on a real RN runtime. Production scenario
# — Cloudflare tunnel drops, the app's `socket.onclose` handler bumps
# phase to `reconnecting`, the auto-reconnect timer fires after
# `AUTO_RECONNECT_DELAY`, and (when the server is reachable again)
# phase returns to `connected`.
#
# This flow pins:
#   (a) Recovery: the app ends up reconnected and usable (the input
#       placeholder flips back to "Message Claude..." and the input bar
#       is focused-able). Banner/spinner visibility is too short to
#       hard-assert on Maestro's iOS hierarchy poll interval (~1-in-3
#       catch rate observed on iPhone 16 Pro) — that mount is
#       unit-test territory.
#   (b) #5468 drop marker: mock-server emits
#       "mock reconnect #<N>" (as a system-type message) on the SECOND
#       auth within this server process. The flow hard-asserts that
#       text after recovery, proving a real WS drop + reconnect happened
#       — a broken simulate-disconnect path (mock never calls
#       ws.terminate()) means the app never reconnects, the mock never
#       sees a second auth, and the marker is never emitted.
#
# Trigger: 'simulate-disconnect' user input → mock-server schedules a
# `ws.terminate()` after a 1s delay (abrupt TCP teardown, mirrors a
# Cloudflare tunnel drop — the client observes a 1006 close code
# locally without a Close frame on the wire). After AUTO_RECONNECT_DELAY
# (currently ~1500ms in connection.ts), the app auto-reconnects to the
# same URL — and because the mock-server is still up on port 9876,
# the reconnect succeeds and the marker is emitted.
#
# Deliberately RED run (for on-device verification): comment out the
# `ws.terminate()` line in mock-server.mjs and confirm the
# `extendedWaitUntil` for "mock reconnect #" times out — proving the
# marker is only reachable via a real drop.
#
# Reconnect timing is inherently flakey on a simulator (Metro pause,
# bridge GC, network throttle), so the assertion uses generous
# `extendedWaitUntil` timeouts. The fixture seeding pattern is
# documented in CLAUDE.md → "Fixture Seeding for Structured Renderers".
#
# Tested devices: portrait iPhone (iOS 17+). Mirrors chat-todolist /
# stream-stall-chip flows.
# Requires: dev client installed + mock server on port 9876
#   cd packages/app && npx expo run:ios
#   bash packages/app/.maestro/scripts/start-mock-server.sh

- runFlow: setup/ensure-session-screen.yaml

# Ensure Chat tab is selected.
- tapOn: "Chat"
- waitForAnimationToEnd

# Send the simulate-disconnect trigger. Mock-server schedules a WS
# close 1s after receiving this input, so we get a clean ack first.
- tapOn:
    id: "chat-message-input"
- inputText: "simulate-disconnect"

- tapOn:
    id: "chat-send-button"


# Wait for the reconnect to succeed. The mock-server stays up on port
# 9876 so the auto-reconnect lands → phase flips back to `connected`
# → the banner unmounts. Long timeout because the reconnect may take
# multiple attempts on a slow simulator. We assert by `notVisible`
# on the banner, with a fallback positive assertion that the chat
# input is reachable (i.e. SessionScreen is in its happy-path layout).
- extendedWaitUntil:
    notVisible:
      id: "reconnect-banner"
    timeout: 30000

# Recovered-state signal: while dropped, the input bar's placeholder is
# "Reconnecting..." (disabled); once phase returns to connected it flips
# back to "Message Claude...". Waiting for the placeholder pins the
# actual recovery (the banner notVisible check above can be trivially
# true if the poll never caught the banner at all).
- extendedWaitUntil:
    visible:
      text: "Message Claude..."
    timeout: 30000

# #5468 — Hard-assert the reconnect marker emitted by mock-server on
# the second auth (i.e. the post-reconnect auth). The marker is a
# system-type message with content "mock reconnect #<N>". Waiting for
# it proves the full drop + reconnect cycle completed end-to-end:
# ws.terminate() fired → client got 1006 close → re-dialled → second
# auth received → marker emitted → store dispatched the message →
# ChatView rendered the bubble.
- extendedWaitUntil:
    visible:
      text: ".*mock reconnect #.*"
    timeout: 15000

# Positive confirmation: the input bar is still wired and we can
# focus it (proves the SessionScreen is in a usable state, not stuck
# in a disconnected / cached-history fallback).
- tapOn:
    id: "chat-message-input"
- assertVisible:
    id: "chat-send-button"

- takeScreenshot: reconnect-completed
