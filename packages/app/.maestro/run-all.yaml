appId: host.exp.Exponent
name: All E2E flows
---

# Run all E2E flows sequentially on one device.
# This avoids the parallelism issue when passing multiple files to `maestro test`.

# --- Phase 1: ConnectScreen flows (no server needed) ---

# Flow 1: ConnectScreen renders correctly
- runFlow: connect-screen.yaml

# Flow 2: Manual entry flow
- runFlow: manual-connect.yaml

# Flow 3: LAN scan flow
- runFlow: lan-scan.yaml

# Flow 4: Small screen layout (iPhone SE)
- runFlow: small-screen-layout.yaml

# --- Phase 2: SessionScreen flows (mock server required) ---
# Prerequisites: start mock server before running these flows
#   bash .maestro/scripts/start-mock-server.sh

# Flow 5: SessionScreen connected state
- runFlow: session-screen-connected.yaml

# Flow 6: Chat/Files view mode switching
- runFlow: session-view-modes.yaml

# Flow 7: File browser navigation
- runFlow: session-file-browser.yaml

# Flow 8: Send message and receive response
- runFlow: session-messages.yaml

# Flow 9: Chat TodoList renderer (#4195) — end-to-end exercise of the
# #4180 mobile TodoList via mock-server tool_start + tool_result.
- runFlow: chat-todolist.yaml

# Flow 10: ToolBubble collapsed-preview field-priority (#4260) —
# exercises the #4243 partial-summary extraction via mock-server
# 'show-bash-partial' trigger (tool_start + streaming tool_input_delta).
- runFlow: chat-tool-partial-summary.yaml

# Flow 11: StreamStallChip render + retry (#4507) — exercises the
# #4496 mobile chip adoption of the server's `error{code:'stream_stall'}`
# wire signal via mock-server 'show-stream-stall' trigger.
- runFlow: stream-stall-chip.yaml

# Flow 12: PlanApprovalCard approve path (#4696) — exercises the
# plan_ready → PlanApprovalCard mount → Approve → canonical
# PLAN_APPROVAL_MESSAGE send + clearPlanState chain via mock-server
# 'show-plan-approval' trigger.
- runFlow: plan-approval.yaml

# Flow 13: PlanApprovalCard deny/feedback path (#4696) — sibling that
# verifies the Give Feedback button focuses the input without
# dismissing the card, and that sending a rebuttal afterwards clears
# plan state.
- runFlow: plan-approval-deny.yaml

# Flow 14: TerminalView render (#4701) — exercises the Terminal mode
# toggle and the WebView mount on the chroxy dev client via
# mock-server 'show-terminal' trigger.
- runFlow: terminal-view.yaml

# Flow 15: Reconnect after tunnel drop (#4701) — exercises the
# ConnectionPhase `connected → reconnecting → connected` transition +
# the reconnect banner / spinner via mock-server 'simulate-disconnect'
# trigger.
- runFlow: reconnect.yaml
