name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  server-tests:
    name: Server Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run tests
        run: npm test

  server-lint:
    name: Server Lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

      - name: Check server lockfile freshness
        run: |
          npm install --package-lock-only
          git diff --exit-code package-lock.json || {
            echo "::error::packages/server/package-lock.json is stale. Run 'cd packages/server && npm install --package-lock-only' and commit the result."
            exit 1
          }

  dashboard-tests:
    name: Dashboard Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Check generated tokens are up-to-date
        run: |
          node scripts/generate-theme-tokens.mjs
          git diff --exit-code src/dashboard-next/src/theme/tokens.ts || {
            echo "::error::tokens.ts is stale. Run 'npm run dashboard:generate-tokens' and commit the result."
            exit 1
          }

      - name: Run dashboard tests
        run: npm run dashboard:test

  dashboard-typecheck:
    name: Dashboard Type Check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type check dashboard
        run: npm run dashboard:typecheck

  store-core-typecheck:
    name: Store Core Type Check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/store-core
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type check store-core
        run: npm run typecheck

  app-tests:
    name: App Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run tests
        run: npm test

  app-typecheck:
    name: App Type Check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type check
        run: npx tsc --noEmit

  desktop-tests:
    name: Desktop Rust Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/desktop/src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test
