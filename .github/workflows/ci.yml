name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  server-tests:
    name: Server Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run tests
        run: npm test

  server-lint:
    name: Server Lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

  dashboard-tests:
    name: Dashboard Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Check generated tokens are up-to-date
        run: |
          node scripts/generate-theme-tokens.mjs
          git diff --exit-code src/dashboard-next/src/theme/tokens.ts || {
            echo "::error::tokens.ts is stale. Run 'npm run dashboard:generate-tokens' and commit the result."
            exit 1
          }

      - name: Run dashboard tests
        run: npm run dashboard:test

  dashboard-typecheck:
    name: Dashboard Type Check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type check dashboard
        run: npm run dashboard:typecheck

  app-tests:
    name: App Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run tests
        run: npm test

  app-typecheck:
    name: App Type Check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type check
        run: npx tsc --noEmit
