name: Auto Version

# Bump patch version after every PR merge to main.
# Branch protection requires CI to pass before merge, so this only
# fires on commits that already passed CI.

on:
  push:
    branches: [main]

# GitHub Actions does not trigger workflows from commits made by GITHUB_TOKEN,
# which prevents infinite loops. The commit message check is belt-and-suspenders.

permissions:
  contents: write

jobs:
  bump:
    name: Bump Patch Version
    runs-on: ubuntu-24.04
    # Skip version-bump commits
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump patch version
        run: bash scripts/bump-version.sh

      - name: Validate bump
        run: |
          # Verify all version files parse correctly before pushing
          node -e "const v = require('./packages/server/package.json').version; if (!/^\d+\.\d+\.\d+$/.test(v)) { throw new Error('Invalid version: ' + v); } console.log('server:', v);"
          node -e "const v = require('./packages/app/package.json').version; console.log('app:', v);"
          node -e "const v = require('./packages/desktop/package.json').version; console.log('desktop:', v);"
          node -e "const v = require('./package.json').version; console.log('root:', v);"
          node -e "const c = require('./packages/desktop/src-tauri/tauri.conf.json'); console.log('tauri:', c.version);"
          grep -q '^version = "' packages/desktop/src-tauri/Cargo.toml && echo "Cargo.toml: OK"
          echo "All version files validated."

      - name: Commit and push
        run: |
          NEXT=$(node -p "require('./packages/server/package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json packages/server/package.json packages/app/package.json packages/desktop/package.json packages/desktop/src-tauri/tauri.conf.json packages/desktop/src-tauri/Cargo.toml packages/desktop/src-tauri/Cargo.lock
          git commit -m "chore: bump version to v${NEXT}"
          git push
